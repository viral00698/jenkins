server:
   port: 8083

app:
   allowed-db-hosts:
   - localhost
   - 127.0.0.1

spring:
   datasource:
      url: jdbc:postgresql://postgres-db:5432/Test
      username: postgres
      password: root
      driver-class-name: org.postgresql.Driver

   jpa:
      hibernate:
         ddl-auto: update # none | validate | update | create | create-drop
      show-sql: true
      properties:
         hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
#logging:
#  level:
#    org.springframework.security: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

  tracing:
    sampling:
      probability: 1.0

logging:
  file:
    name: logs/app.log


    
        
